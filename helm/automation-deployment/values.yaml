############################################################
# Global
############################################################

namespace: automation-deployment

############################################################
# Deployment
############################################################

deployment:
  name: automation-deployment
  replicaCount: 2
  revisionHistoryLimit: 5

  strategy:
    type: RollingUpdate

    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1

############################################################
# Docker Image
############################################################

image:
  registry: localhost:8083
  repository: docker-hosted
  name: automation-deployment
  tag: "1.0.0"
  pullPolicy: IfNotPresent

############################################################
# Image Pull Secrets
############################################################

imagePullSecrets: []

############################################################
# Container
############################################################

container:
  name: automation-deployment
  port: 8080
  terminationGracePeriodSeconds: 30

############################################################
# Service
############################################################

service:
  name: automation-service
  type: NodePort

  port: 80
  targetPort: 8080
  nodePort: 30080

############################################################
# ConfigMap
############################################################

configMap:
  name: automation-config

config:
  APP_NAME: automation-deployment
  APP_ENV: development
  APP_VERSION: "1.0"
  LOG_LEVEL: INFO
  TZ: Asia/Kolkata

############################################################
# Secret
############################################################

secretRef:
  name: automation-secret

secret:
  DB_USERNAME: admin
  DB_PASSWORD: Password@123

############################################################
# Resources
############################################################

resources:

  requests:
    cpu: "250m"
    memory: "512Mi"

  limits:
    cpu: "500m"
    memory: "1Gi"

############################################################
# Readiness Probe
############################################################

readinessProbe:

  enabled: true

  httpGet:
    path: /
    port: 8080

  initialDelaySeconds: 20
  periodSeconds: 10
  timeoutSeconds: 5
  successThreshold: 1
  failureThreshold: 3

############################################################
# Liveness Probe
############################################################

livenessProbe:

  enabled: true

  httpGet:
    path: /
    port: 8080

  initialDelaySeconds: 40
  periodSeconds: 20
  timeoutSeconds: 5
  successThreshold: 1
  failureThreshold: 3

############################################################
# Autoscaling
############################################################

autoscaling:

  enabled: false

  minReplicas: 2

  maxReplicas: 5

  targetCPUUtilizationPercentage: 80

############################################################
# Ingress
############################################################

ingress:

  enabled: false

  className: nginx

  annotations: {}

  hosts:

    - host: automation.local

      paths:

        - path: /

          pathType: Prefix

  tls: []

############################################################
# Network Policy
############################################################

networkPolicy:

  enabled: false

############################################################
# Service Account
############################################################

serviceAccount:

  create: false

  name: default

############################################################
# Pod Labels
############################################################

podLabels: {}

############################################################
# Pod Annotations
############################################################

podAnnotations: {}

############################################################
# Scheduling
############################################################

nodeSelector: {}

affinity: {}

tolerations: []

############################################################
# Extra Environment Variables
############################################################

extraEnv: []

############################################################
# Extra Volumes
############################################################

volumes: []

volumeMounts: []
