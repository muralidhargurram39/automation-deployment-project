{{- if .Values.networkPolicy.enabled }}

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy

metadata:
  name: {{ .Values.deployment.name }}

  namespace: {{ include "automation-deployment.namespace" . }}

spec:

  podSelector:

    matchLabels:

{{ include "automation-deployment.selectorLabels" . | indent 6 }}

  policyTypes:

    - Ingress

    - Egress

{{- end }}
