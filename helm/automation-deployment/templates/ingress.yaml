{{- if .Values.ingress.enabled }}

apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:
  name: {{ include "automation-deployment.fullname" . }}

  namespace: {{ include "automation-deployment.namespace" . }}

spec:

  ingressClassName: {{ .Values.ingress.className }}

  rules:

{{- range .Values.ingress.hosts }}

  - host: {{ .host }}

    http:

      paths:

{{- range .paths }}

      - path: {{ .path }}

        pathType: {{ .pathType }}

        backend:

          service:

            name: {{ $.Values.service.name }}

            port:

              number: {{ $.Values.service.port }}

{{- end }}

{{- end }}

{{- end }}
