apiVersion: v1
kind: ConfigMap

metadata:
  name: {{ include "automation-deployment.configmap" . }}
  namespace: {{ include "automation-deployment.namespace" . }}

  labels:
{{ include "automation-deployment.labels" . | indent 4 }}

data:
  APP_NAME: {{ .Values.config.APP_NAME | quote }}
  APP_ENV: {{ .Values.config.APP_ENV | quote }}
  APP_VERSION: {{ .Values.config.APP_VERSION | quote }}
  LOG_LEVEL: {{ .Values.config.LOG_LEVEL | quote }}
  TZ: {{ .Values.config.TZ | quote }}
