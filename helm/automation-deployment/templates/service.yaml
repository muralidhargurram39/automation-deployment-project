apiVersion: v1
kind: Service

metadata:
  name: {{ include "automation-deployment.service" . }}
  namespace: {{ include "automation-deployment.namespace" . }}

  labels:
{{ include "automation-deployment.labels" . | indent 4 }}

spec:
  type: {{ .Values.service.type }}

  selector:
{{ include "automation-deployment.selectorLabels" . | indent 4 }}

  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      nodePort: {{ .Values.service.nodePort }}
